name: Chobby macOS (combined bar bundle)

on:
  # Manual trigger from the Actions tab.
  workflow_dispatch:
  # Rebuild on every push to the fork's default branch.
  push:
    branches:
      - main
  # Refresh the combined bundle daily so it picks up new bar-lobby thin DMGs
  # (bar-lobby releases on every push; this re-packs the latest lobby app
  # alongside the Chobby app without needing a cross-repo trigger).
  schedule:
    - cron: "23 5 * * *"

# The build job creates a GitHub Release on this repo and pushes the cask bump,
# which needs write access.
permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    # macos-latest is Apple Silicon (arm64), which matches the arm64-only DMG
    # target in spring-launcher's macos branch.
    runs-on: macos-latest
    steps:
      # This repo (BYAR-Chobby) carries dist_cfg and the make_package_json.js
      # build helper. fetch-depth: 0 is required for `git rev-list --count HEAD`
      # to produce a stable version number. https://stackoverflow.com/a/65056108
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: BYAR-Chobby

      # Our macOS port of the launcher. The 'macos' branch adds the build-mac
      # script, the arm64 DMG target, and the runtime engine downloader that
      # fetches the engine from ExaDev/RecoilEngine, so the DMG never bundles
      # an engine.
      - uses: actions/checkout@v4
        with:
          repository: ExaDev/spring-launcher
          ref: macos
          path: launcher

      - name: Setup NodeJs
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: 'npm'
          cache-dependency-path: launcher/package-lock.json

      # Identical to launcher.yml: drop dist_cfg into the launcher's src/, then
      # promote the bin/files/build subtrees up to the launcher root.
      - name: Patch launcher with dist_cfg
        run: |
          cp -r BYAR-Chobby/dist_cfg/* launcher/src/
          for dir in bin files build; do
            mkdir -p launcher/$dir
            if [ -d launcher/src/$dir/ ]; then
              mv launcher/src/$dir/* launcher/$dir/
              rm -rf launcher/src/$dir
            fi
          done
          exit 0

      # Stamp version (1.<commit-count>.0), appId, name and repository into the
      # launcher's package.json.
      - name: Make package.json
        run: |
          cd BYAR-Chobby
          export PACKAGE_VERSION=1.$(git rev-list --count HEAD).0
          echo "Making build for version: $PACKAGE_VERSION"
          node build/make_package_json.js ../launcher/package.json dist_cfg/config.json $GITHUB_REPOSITORY $PACKAGE_VERSION
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"

      # Pin productName + dmg artifact name so the Chobby app is
      # "Beyond All Reason (Chobby)" (distinct from bar-lobby's "BeyondAllReason")
      # and does not collide inside the combined DMG.
      - name: Override macOS productName and DMG artifact name
        run: |
          cd launcher
          node -e '
            const fs = require("fs");
            const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
            p.build = p.build || {};
            p.build.productName = "Beyond All Reason (Chobby)";
            p.build.dmg = p.build.dmg || {};
            p.build.dmg.artifactName = "BeyondAllReason-Chobby-${version}-mac-arm64.dmg";
            fs.writeFileSync("package.json", JSON.stringify(p), "utf8");
          '
          node -e 'const p=require("./package.json"); console.log("productName:", p.build.productName); console.log("dmg.artifactName:", p.build.dmg.artifactName); console.log("version:", p.version);'

      - name: Cache electron
        uses: actions/cache@v4
        with:
          path: .electron-cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('launcher/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      # electron-builder's macOS target requires an icon of at least 512x512.
      # dist_cfg ships a 256x256 build/icon.png (fine for win/linux), so upscale
      # the copy promoted into launcher/build before building the DMG.
      - name: Ensure macOS icon is at least 512x512
        run: |
          ICON="launcher/build/icon.png"
          if [ -f "$ICON" ]; then
            sips -z 1024 1024 "$ICON" --out "$ICON"
            sips -g pixelWidth -g pixelHeight "$ICON"
          else
            echo "::warning::$ICON not found; electron-builder will use its default icon"
          fi

      # build-mac runs `electron-builder -m` (mac.identity null => ad-hoc sign).
      - name: Build Chobby macOS app
        run: |
          cd launcher
          npm ci
          # --publish never: we create the GitHub release ourselves below, so
          # electron-builder must not try to publish (it would fail on a missing
          # token in CI).
          npm run build-mac -- --publish never
        env:
          ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache/main
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.electron-cache/builder

      # Assemble ONE combined DMG carrying BOTH thin apps:
      #   - BeyondAllReason.app          (bar-lobby, fetched from its latest release)
      #   - Beyond All Reason (Chobby).app (built above)
      # Both are thin launchers that download the shared engine at runtime, so the
      # combined DMG stays small (~300MB) with no engine duplication. The single
      # 'bar' cask installs both with two app stanzas.
      - name: Assemble combined bar bundle DMG
        id: bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/bar-bundle"
          mkdir -p "$STAGE"

          # 1. Chobby app from the DMG we just built.
          CHOBBY_DMG="launcher/dist/BeyondAllReason-Chobby-${PACKAGE_VERSION}-mac-arm64.dmg"
          [ -f "$CHOBBY_DMG" ] || { echo "::error::Chobby DMG missing: $CHOBBY_DMG"; ls -la launcher/dist || true; exit 1; }
          MNT_C=$(mktemp -d)
          hdiutil attach -nobrowse -readonly -mountpoint "$MNT_C" "$CHOBBY_DMG"
          cp -R "$MNT_C/Beyond All Reason (Chobby).app" "$STAGE/"
          hdiutil detach "$MNT_C"

          # 2. Latest bar-lobby thin DMG. Pick the newest release that ALREADY
          # carries the mac DMG asset (a release created seconds ago by a
          # concurrent bar-lobby run may still be mid-upload, so the very latest
          # tag can lack the asset).
          LOBBY_TAG=""
          for t in $(gh release list --repo ExaDev/bar-lobby --limit 30 \
            --json tagName,isDraft,publishedAt \
            --jq '[.[] | select(.isDraft | not) | select(.tagName | startswith("v"))]
                  | sort_by(.publishedAt) | reverse | .[].tagName'); do
            if gh release view "$t" --repo ExaDev/bar-lobby --json assets \
                 --jq '.assets[].name' | grep -q 'mac-arm64\.dmg$'; then
              LOBBY_TAG="$t"; break
            fi
          done
          [ -n "$LOBBY_TAG" ] || { echo "::error::no bar-lobby release with a mac DMG"; exit 1; }
          echo "Using bar-lobby release $LOBBY_TAG"
          mkdir -p "$RUNNER_TEMP/lobby"
          gh release download "$LOBBY_TAG" --repo ExaDev/bar-lobby \
            --pattern 'BeyondAllReason-*-mac-arm64.dmg' --dir "$RUNNER_TEMP/lobby"
          LOBBY_DMG=$(ls "$RUNNER_TEMP"/lobby/BeyondAllReason-*-mac-arm64.dmg | head -1)
          MNT_L=$(mktemp -d)
          hdiutil attach -nobrowse -readonly -mountpoint "$MNT_L" "$LOBBY_DMG"
          cp -R "$MNT_L/BeyondAllReason.app" "$STAGE/"
          hdiutil detach "$MNT_L"

          # 3. Build the combined DMG (both apps + an Applications symlink).
          ln -s /Applications "$STAGE/Applications"
          OUT="$RUNNER_TEMP/BeyondAllReason-bundle-${PACKAGE_VERSION}-mac-arm64.dmg"
          hdiutil create -ov -volname "Beyond All Reason" -fs HFS+ \
            -srcfolder "$STAGE" -format UDZO "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$OUT")" >> "$GITHUB_OUTPUT"
          ls -la "$OUT"

      - name: Publish combined GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${PACKAGE_VERSION}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "${{ steps.bundle.outputs.path }}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "${{ steps.bundle.outputs.path }}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Beyond All Reason (lobby + chobby) $TAG" \
              --notes "Combined macOS (arm64) bundle: BeyondAllReason.app (bar-lobby) and Beyond All Reason (Chobby).app. Both are thin launchers that fetch the shared engine from ExaDev/RecoilEngine at runtime. Ad-hoc signed (not notarised); after install clear quarantine: xattr -dr com.apple.quarantine \"/Applications/Beyond All Reason.app\" \"/Applications/Beyond All Reason (Chobby).app\""
          fi

  # Windows counterpart of the macOS 'build' job: build the Chobby Windows app
  # as a zip, fetch the latest bar-lobby Windows zip, and pack both into ONE
  # combined zip (lobby/ + chobby/ subdirs) published to the same release tag.
  # Mirrors the version/dist_cfg/make_package_json steps from 'build' exactly so
  # the Windows and macOS bundles share a version number per push.
  windows-bundle:
    runs-on: windows-latest
    steps:
      # Same checkout as the mac job: BYAR-Chobby carries dist_cfg and the
      # make_package_json.js helper, and fetch-depth: 0 is required for the
      # `git rev-list --count HEAD` version number.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: BYAR-Chobby

      - uses: actions/checkout@v4
        with:
          repository: ExaDev/spring-launcher
          ref: macos
          path: launcher

      - name: Setup NodeJs
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: 'npm'
          cache-dependency-path: launcher/package-lock.json

      # Identical to the mac job. Use bash (git-bash is on windows-latest) because
      # `cp -r` merges into the existing launcher/src tree, whereas PowerShell's
      # Copy-Item -Recurse errors when a target subdir (e.g. src/renderer) exists.
      - name: Patch launcher with dist_cfg
        shell: bash
        run: |
          cp -r BYAR-Chobby/dist_cfg/* launcher/src/
          for dir in bin files build; do
            mkdir -p launcher/$dir
            if [ -d launcher/src/$dir/ ]; then
              mv launcher/src/$dir/* launcher/$dir/
              rm -rf launcher/src/$dir
            fi
          done
          exit 0

      # Stamp version (1.<commit-count>.0), appId, name and repository into the
      # launcher's package.json. Same helper and version formula as the mac job.
      - name: Make package.json
        shell: pwsh
        run: |
          Set-Location BYAR-Chobby
          $PACKAGE_VERSION = "1.$(git rev-list --count HEAD).0"
          Write-Host "Making build for version: $PACKAGE_VERSION"
          node build/make_package_json.js ../launcher/package.json dist_cfg/config.json $env:GITHUB_REPOSITORY $PACKAGE_VERSION
          "PACKAGE_VERSION=$PACKAGE_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # Pin productName so the Chobby exe is "Beyond All Reason (Chobby).exe"
      # (distinct from bar-lobby's "BeyondAllReason.exe"), and force a zip target
      # with a predictable name. spring-launcher's build-win is `electron-builder
      # -w` and its package.json sets no win.target, so without this override it
      # would emit only an nsis installer, not an extractable zip.
      - name: Override Windows productName and win zip target
        shell: pwsh
        run: |
          Set-Location launcher
          node -e '
            const fs = require("fs");
            const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
            p.build = p.build || {};
            p.build.productName = "Beyond All Reason (Chobby)";
            p.build.win = p.build.win || {};
            p.build.win.target = ["zip"];
            p.build.win.artifactName = "BeyondAllReason-Chobby-${version}-win-x64.${ext}";
            fs.writeFileSync("package.json", JSON.stringify(p), "utf8");
          '
          node -e 'const p=require("./package.json"); console.log("productName:", p.build.productName); console.log("win.target:", p.build.win.target); console.log("win.artifactName:", p.build.win.artifactName); console.log("version:", p.version);'

      - name: Cache electron
        uses: actions/cache@v4
        with:
          path: .electron-cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('launcher/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      # build-win runs `electron-builder -w`; with the override above it emits
      # launcher/dist/BeyondAllReason-Chobby-<version>-win-x64.zip.
      - name: Build Chobby Windows zip
        shell: pwsh
        run: |
          Set-Location launcher
          npm ci
          # --publish never: the release is created explicitly later; electron-builder
          # must not attempt to publish (it would fail on a missing token in CI).
          npm run build-win -- --publish never
        env:
          ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache/main
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.electron-cache/builder

      # Assemble ONE combined zip carrying BOTH thin apps under named subdirs:
      #   lobby/  -> BeyondAllReason.exe          (bar-lobby, latest release zip)
      #   chobby/ -> Beyond All Reason (Chobby).exe (built above)
      # Both are thin launchers that download the shared engine at runtime, so the
      # combined zip stays small with no engine duplication. The single 'bar'
      # Scoop manifest installs both with two shortcut entries.
      - name: Assemble combined Windows bundle zip
        id: bundle
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $STAGE = "$env:RUNNER_TEMP/bar-bundle"
          New-Item -ItemType Directory -Path $STAGE -Force | Out-Null

          # 1. Chobby app from the zip we just built.
          $CHOBBY_ZIP = "launcher/dist/BeyondAllReason-Chobby-$env:PACKAGE_VERSION-win-x64.zip"
          if (-not (Test-Path $CHOBBY_ZIP)) {
            Write-Host "::error::Chobby zip missing: $CHOBBY_ZIP"
            Get-ChildItem "launcher/dist" -ErrorAction SilentlyContinue | Format-Table -AutoSize
            exit 1
          }
          New-Item -ItemType Directory -Path "$STAGE/chobby" -Force | Out-Null
          Expand-Archive -Path $CHOBBY_ZIP -DestinationPath "$STAGE/chobby" -Force

          # 2. Latest bar-lobby Windows zip. Pick the newest release that ALREADY
          # carries the win zip asset (a concurrent bar-lobby run may have just
          # created a release still mid-upload, so the newest tag can lack it).
          New-Item -ItemType Directory -Path "$env:RUNNER_TEMP/lobby" -Force | Out-Null
          $LOBBY_ZIP = $null
          $tags = gh release list --repo ExaDev/bar-lobby --limit 30 `
            --json tagName,isDraft,publishedAt `
            --jq '[.[] | select(.isDraft | not) | select(.tagName | startswith("v"))] | sort_by(.publishedAt) | reverse | .[].tagName'
          foreach ($t in $tags) {
            $names = gh release view $t --repo ExaDev/bar-lobby --json assets --jq '.assets[].name'
            if ($names -match 'win-x64\.zip') {
              gh release download $t --repo ExaDev/bar-lobby `
                --pattern 'BeyondAllReason-*-win-x64.zip' --dir "$env:RUNNER_TEMP/lobby"
              $LOBBY_ZIP = (Get-ChildItem "$env:RUNNER_TEMP/lobby/BeyondAllReason-*-win-x64.zip" | Select-Object -First 1).FullName
              if ($LOBBY_ZIP) { Write-Host "Using bar-lobby release $t"; break }
            }
          }
          if (-not $LOBBY_ZIP) {
            Write-Host "::error::no bar-lobby release with a Windows zip"
            exit 1
          }
          New-Item -ItemType Directory -Path "$STAGE/lobby" -Force | Out-Null
          Expand-Archive -Path $LOBBY_ZIP -DestinationPath "$STAGE/lobby" -Force

          # 3. Build the combined zip (both subdirs).
          $OUT = "$env:RUNNER_TEMP/BeyondAllReason-bundle-$env:PACKAGE_VERSION-win-x64.zip"
          Compress-Archive -Path "$STAGE/lobby", "$STAGE/chobby" -DestinationPath $OUT -Force
          "path=$OUT" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=$(Split-Path $OUT -Leaf)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Get-Item $OUT | Format-List

      # Upload to the SAME release tag the mac 'build' job uses (v<version>), so
      # the macOS DMG and the Windows bundle live on one release per push.
      - name: Publish bundle to combined GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $TAG = "v$env:PACKAGE_VERSION"
          $BUNDLE = "${{ steps.bundle.outputs.path }}"
          $exists = gh release view $TAG --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $TAG $BUNDLE --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $TAG $BUNDLE `
              --repo $env:GITHUB_REPOSITORY `
              --title "Beyond All Reason (lobby + chobby) $TAG" `
              --notes "Combined Windows (x64) bundle: lobby/ (bar-lobby) and chobby/ (Chobby launcher). Both are thin launchers that fetch the shared engine from ExaDev/RecoilEngine at runtime."
          }

  # Regenerate the single 'bar' Scoop manifest to point at the combined Windows
  # bundle via the scoped SSH deploy key (no PAT). Mirrors bar-lobby's
  # release.yml update-scoop structure; the combined bundle now owns scoop 'bar'.
  update-scoop:
    needs: windows-bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bucket via SSH deploy key
        uses: actions/checkout@v4
        with:
          repository: ExaDev/scoop-bar
          ssh-key: ${{ secrets.CHOBBY_SCOOP_DEPLOY_KEY }}
      - name: Update manifest to the combined bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG=$(gh release list --repo ExaDev/BYAR-Chobby --limit 30 \
            --json tagName,isDraft,publishedAt \
            --jq '[.[] | select(.isDraft | not) | select(.tagName | startswith("v"))]
                  | sort_by(.publishedAt) | reverse | .[0].tagName')
          VERSION="${TAG#v}"
          ASSET="BeyondAllReason-bundle-${VERSION}-win-x64.zip"
          URL="https://github.com/ExaDev/BYAR-Chobby/releases/download/${TAG}/${ASSET}"
          gh release view "$TAG" --repo ExaDev/BYAR-Chobby --json assets \
            --jq '.assets[].name' | grep -qx "$ASSET" \
            || { echo "::error::$ASSET not on $TAG"; exit 1; }
          curl -fsSL --retry 6 --retry-delay 5 --retry-all-errors "$URL" -o /tmp/bundle.zip
          SHA=$(shasum -a 256 /tmp/bundle.zip | cut -d' ' -f1)
          [[ "$SHA" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::bad sha256: $SHA"; exit 1; }
          cat > bucket/bar.json <<JSON
          {
              "version": "${VERSION}",
              "description": "Beyond All Reason: bar-lobby + Chobby (Windows)",
              "homepage": "https://www.beyondallreason.info/",
              "license": {
                  "identifier": "MIT",
                  "url": "https://github.com/ExaDev/bar-lobby/blob/master/LICENSE.md"
              },
              "architecture": {
                  "64bit": {
                      "url": "${URL}",
                      "hash": "${SHA}"
                  }
              },
              "shortcuts": [
                  ["lobby\\\\BeyondAllReason.exe", "Beyond All Reason"],
                  ["chobby\\\\Beyond All Reason (Chobby).exe", "Beyond All Reason (Chobby)"]
              ],
              "checkver": {
                  "github": "https://github.com/ExaDev/BYAR-Chobby"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/ExaDev/BYAR-Chobby/releases/download/v\$version/BeyondAllReason-bundle-\$version-win-x64.zip"
                      }
                  }
              }
          }
          JSON
          python3 -c "import json; json.load(open('bucket/bar.json'))"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/bar.json
          git diff --cached --quiet || git commit -m "bar (lobby + chobby) ${VERSION}"
          git push

  # Bump the single 'bar' cask to the combined bundle via the scoped SSH deploy
  # key (no PAT). The cask carries two app stanzas; only version + sha256 change.
  update-cask:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap via SSH deploy key
        uses: actions/checkout@v4
        with:
          repository: ExaDev/homebrew-bar
          ssh-key: ${{ secrets.CHOBBY_TAP_DEPLOY_KEY }}
      - name: Update bar cask to the combined bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG=$(gh release list --repo ExaDev/BYAR-Chobby --limit 30 \
            --json tagName,isDraft,publishedAt \
            --jq '[.[] | select(.isDraft | not) | select(.tagName | startswith("v"))]
                  | sort_by(.publishedAt) | reverse | .[0].tagName')
          VERSION="${TAG#v}"
          ASSET="BeyondAllReason-bundle-${VERSION}-mac-arm64.dmg"
          URL="https://github.com/ExaDev/BYAR-Chobby/releases/download/${TAG}/${ASSET}"
          gh release view "$TAG" --repo ExaDev/BYAR-Chobby --json assets \
            --jq '.assets[].name' | grep -qx "$ASSET" \
            || { echo "::error::$ASSET not on $TAG"; exit 1; }
          curl -fsSL --retry 6 --retry-delay 5 --retry-all-errors "$URL" -o /tmp/bundle.dmg
          SHA=$(shasum -a 256 /tmp/bundle.dmg | cut -d' ' -f1)
          [[ "$SHA" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::bad sha256: $SHA"; exit 1; }
          sed -i -E "s/^  version \".*\"/  version \"${VERSION}\"/" Casks/bar.rb
          sed -i -E "s/^  sha256 .*/  sha256 \"${SHA}\"/" Casks/bar.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/bar.rb
          git diff --cached --quiet || git commit -m "bar (lobby + chobby) ${VERSION}"
          git push
